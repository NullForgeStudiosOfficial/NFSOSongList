<!DOCTYPE html>
<html>
<head>
<title>NFSO Song Search</title>

<style>

body {
    background: #1a1d21;
    color: #e6e6e6;
    font-family: Arial, sans-serif;
    margin: 0;
}

.Header {
    background: #242830;
    padding: 20px;
    border-bottom: 1px solid #3a3f4b;
}

.Header h1 {
    margin: 0;
}

#songcount {
    color: #9aa0aa;
    margin-top: 8px;
    font-size: 14px;
}

.SearchBar {
    padding: 20px;
}

input {
    width: 100%;
    box-sizing: border-box;
    background: #2c313c;
    color: white;
    border: 1px solid #4d5360;
    border-radius: 8px;
    padding: 12px;
    font-size: 18px;
}

input:focus {
    outline: none;
    border-color: #7c4dff;
}

#results {
    padding: 0 20px 20px 20px;

    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(400px, 1fr));
    gap: 10px;
}

.song {
    background: #242830;
    border: 1px solid #3a3f4b;
    border-radius: 8px;
    padding: 12px;

    transition: 0.15s;
}

.song:hover {
    background: #2c313c;
    transform: translateY(-2px);
}

.songname {
    font-size: 18px;
    font-weight: bold;
    margin-bottom: 4px;
}

.artist {
    color: #b0b0b0;
    margin-bottom: 6px;
}

.info {
    color: #8f8f8f;
    font-size: 13px;
}

</style>
</head>

<body>

<div class="Header">
    <h1>🥁 NFSO Song Search 🥁</h1>
    <div><p>Ouvert didn't work so... I made my own website, with blackjack♦️, and hookers💃.</p></div>
    <div id="songcount">Loading...</div>
</div>

<div class="SearchBar">
    <input
        id="search"
        placeholder="Search Song, Artist, or Genre..."
    >
</div>

<div id="results"></div>

<script>

let Songs = [];
let FilteredSongs = [];

const SongsPerLoad = 100;

let CurrentIndex = 0;
let IsLoading = false;

function FormatLength(songlength)
{
    const TotalSeconds = Math.floor(songlength / 1000);

    const Minutes = Math.floor(TotalSeconds / 60);
    const Seconds = (TotalSeconds % 60)
        .toString()
        .padStart(2, "0");

    return `${Minutes}:${Seconds}`;
}

function BuildSongCard(song)
{
    return `
        <div class="song">

            <div class="songname">
                ${song.Name || "Unknown Song"}
            </div>

            <div class="artist">
                ${song.Artist || "Unknown Artist"}
            </div>

            <div class="info">
                ${song.Genre || "Unknown Genre"}
                •
                ${FormatLength(song.songlength)}
            </div>

        </div>
    `;
}

function LoadMoreSongs()
{
    if (IsLoading)
        return;

    if (CurrentIndex >= FilteredSongs.length)
        return;

    IsLoading = true;

    const ResultsDiv =
        document.getElementById("results");

    const NextSongs =
        FilteredSongs.slice(
            CurrentIndex,
            CurrentIndex + SongsPerLoad
        );

    ResultsDiv.innerHTML +=
        NextSongs.map(BuildSongCard).join("");

    CurrentIndex += SongsPerLoad;

    IsLoading = false;
}

function SearchSongs(SearchText = "")
{
    SearchText =
        SearchText.toLowerCase().trim();

    if (SearchText === "")
    {
        FilteredSongs = Songs;
    }
    else
    {
        FilteredSongs = Songs.filter(song =>
        {
            return (
                song.Name?.toLowerCase().includes(SearchText) ||
                song.Artist?.toLowerCase().includes(SearchText) ||
                song.Genre?.toLowerCase().includes(SearchText)
            );
        });
    }

    CurrentIndex = 0;

    document.getElementById("results").innerHTML = "";

    LoadMoreSongs();
}

window.addEventListener("scroll", () =>
{
    if (
        window.innerHeight +
        window.scrollY
        >=
        document.body.offsetHeight - 500
    )
    {
        LoadMoreSongs();
    }
});

fetch("songs.json")
.then(response => response.json())
.then(data =>
{
    Songs = data;

    document.getElementById("songcount").innerText =
        `${Songs.length.toLocaleString()} Songs`;

    Songs.sort((a, b) =>
    {
        const ArtistCompare =
            (a.Artist || "").localeCompare(b.Artist || "");

        if (ArtistCompare !== 0)
            return ArtistCompare;

        return (a.Name || "").localeCompare(b.Name || "");
    });

    document.getElementById("songcount").innerText =
        `${Songs.length.toLocaleString()} Songs`;

    SearchSongs();
});

document
.getElementById("search")
.addEventListener("input", e =>
{
    SearchSongs(e.target.value);
});

</script>

</body>
</html>
